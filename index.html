<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Escape Room VR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://c-frame.github.io/aframe-physics-system/dist/aframe-physics-system.min.js"></script>

  <script>
    let hasKey = false;
    let hasTorch = false;
    let timeLeft = 60;

    AFRAME.registerComponent('pickable', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          const id = this.el.id;

          if (id === 'torch') {
            hasTorch = true;
            document.querySelector('#scene')
              .setAttribute('fog', 'color: #222; far: 1000');
          }

          if (id === 'key') {
            hasKey = true;
          }

          this.el.parentNode.removeChild(this.el);
        });
      }
    });

    AFRAME.registerComponent('door', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          if (hasKey) {
            this.el.setAttribute('rotation', '0 90 0');
            document.querySelector('#msg')
              .setAttribute('value', 'Διέφυγες επιτυχώς!');
          } else {
            document.querySelector('#msg')
              .setAttribute('value', 'Η πόρτα είναι κλειδωμένη...');
          }
        });
      }
    });

    AFRAME.registerComponent('timer', {
      init: function () {
        const el = this.el;
        setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            el.setAttribute('value', 'Χρόνος: ' + timeLeft);
          } else {
            el.setAttribute('value', 'Τέλος χρόνου!');
            document.querySelector('#msg')
              .setAttribute('value', 'Απέτυχες να δραπετεύσεις');
          }
        }, 1000);
      }
    });
  </script>
</head>

<body>
<a-scene id="scene"
         fog="color: #222; near: 1; far: 5"
         physics>

  <!-- ΦΩΤΑ -->
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="point" position="0 6 0" intensity="1"></a-light>

  <!-- ΔΩΜΑΤΙΟ -->
  <a-plane static-body rotation="-90 0 0" width="40" height="40" color="#444"></a-plane>
  <a-plane static-body position="0 4 -20" width="40" height="8" color="#666"></a-plane>
  <a-plane static-body position="0 4 20" rotation="0 180 0" width="40" height="8" color="#666"></a-plane>
  <a-plane static-body position="-20 4 0" rotation="0 90 0" width="40" height="8" color="#555"></a-plane>
  <a-plane static-body position="20 4 0" rotation="0 -90 0" width="40" height="8" color="#555"></a-plane>

  <!-- ΣΚΑΛΑ -->
  <a-box static-body color="#8b5a2b" scale="1 2 3" position="0 1 -15"></a-box>
  <a-box static-body color="#8b5a2b" scale="1 2 3" position="0 3 -17"></a-box>

  <!-- ΠΟΡΤΑ -->
  <a-box id="door"
         position="0 5 -19.8"
         width="2"
         height="3"
         depth="0.2"
         color="darkgreen"
         door></a-box>

  <!-- ΚΛΕΙΔΙ -->
  <a-cylinder id="key"
              position="0 4.8 -18"
              radius="0.05"
              height="0.3"
              color="gold"
              pickable></a-cylinder>

  <!-- ΦΑΚΟΣ -->
  <a-cylinder id="torch"
              position="5 1 -5"
              radius="0.15"
              height="0.5"
              color="black"
              pickable>
    <a-light type="spot" intensity="0.8" angle="25" position="0 0.3 0"></a-light>
  </a-cylinder>

  <!-- ΤΡΑΠΕΖΙΑ -->
  <a-box static-body color="brown" scale="3 0.2 3" position="-6 1 -6"></a-box>
  <a-box static-body color="brown" scale="3 0.2 3" position="6 1 6"></a-box>

  <!-- ΚΑΡΕΚΛΕΣ -->
  <a-box static-body color="#5a3a1a" scale="1 0.2 1" position="-8 0.6 -6"></a-box>
  <a-box static-body color="#5a3a1a" scale="1 0.2 1" position="8 0.6 6"></a-box>

  <!-- ΜΗΝΥΜΑ -->
  <a-text id="msg"
          value="Βρες τον φακό και το κλειδί"
          position="-2 2 -3"
          width="4"
          color="white"></a-text>

  <!-- TIMER -->
  <a-text position="2 2 -3"
          width="4"
          color="red"
          timer></a-text>

  <!-- CAMERA -->
  <a-entity position="0 1.6 10"
            camera
            look-controls
            wasd-controls>
    <a-cursor fuse="true" color="yellow"></a-cursor>
  </a-entity>

</a-scene>
</body>
</html>
