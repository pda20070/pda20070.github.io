<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Escape Room VR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    let boxOpened = false;
    let hasKey = false;

    AFRAME.registerComponent('button', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          if (!boxOpened) {
            document.querySelector('#boxTop')
              .setAttribute('rotation', '-90 0 0');
            document.querySelector('#key')
              .setAttribute('visible', true);
            document.querySelector('#msg')
              .setAttribute('value', 'Το κουτί άνοιξε!');
            boxOpened = true;
          }
        });
      }
    });

    AFRAME.registerComponent('pick-key', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          hasKey = true;
          this.el.setAttribute('visible', false);
          document.querySelector('#msg')
            .setAttribute('value', 'Πήρες το κλειδί!');
        });
      }
    });

    AFRAME.registerComponent('door', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          if (hasKey) {
            this.el.setAttribute('rotation', '0 90 0');
            document.querySelector('#msg')
              .setAttribute('value', 'Δραπέτευσες!');
          } else {
            document.querySelector('#msg')
              .setAttribute('value', 'Η πόρτα είναι κλειδωμένη');
          }
        });
      }
    });
  </script>
</head>

<body>
<a-scene>

  <!-- ΦΩΤΑ -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="0 4 2" intensity="1"></a-light>

  <!-- ΠΑΤΩΜΑ -->
  <a-plane rotation="-90 0 0" width="10" height="10" color="#666"></a-plane>

  <!-- ΤΟΙΧΟΣ -->
  <a-box position="0 1 -4" width="10" height="2" depth="0.2" color="#999"></a-box>

  <!-- ΠΟΡΤΑ -->
  <a-box id="door"
         position="0 1 -3.9"
         width="1"
         height="2"
         depth="0.1"
         color="brown"
         door></a-box>

  <!-- ΚΟΥΤΙ -->
  <a-box position="-2 0.5 -2"
         width="1"
         height="0.5"
         depth="1"
         color="#8b5a2b"></a-box>

  <!-- ΚΑΠΑΚΙ ΚΟΥΤΙΟΥ -->
  <a-box id="boxTop"
         position="-2 0.75 -2"
         width="1"
         height="0.1"
         depth="1"
         color="#a0522d"></a-box>

  <!-- ΚΟΥΜΠΙ -->
  <a-sphere position="-2 1 -1.5"
            radius="0.1"
            color="red"
            button></a-sphere>

  <!-- ΚΛΕΙΔΙ (ΚΡΥΜΜΕΝΟ) -->
  <a-cylinder id="key"
              position="-2 0.6 -2"
              radius="0.05"
              height="0.3"
              color="gold"
              visible="false"
              pick-key></a-cylinder>

  <!-- ΜΗΝΥΜΑ -->
  <a-text id="msg"
          value="Βρες τρόπο να ανοίξεις το κουτί"
          position="0 2 -2"
          align="center"
          width="4"
          color="white"></a-text>

  <!-- ΚΑΜΕΡΑ -->
  <a-entity position="0 1.6 3"
            camera
            look-controls
            wasd-controls>
    <a-cursor fuse="true" fuse-timeout="800"></a-cursor>
  </a-entity>

</a-scene>
</body>
</html>
