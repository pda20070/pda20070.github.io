<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mini Escape Room</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- ΦΩΤΑ -->
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="point" intensity="0.8" position="0 3 2"></a-light>

  <!-- ΔΩΜΑΤΙΟ -->
  <a-plane rotation="-90 0 0" width="12" height="12" color="#555"></a-plane>
  <a-box position="0 2 -6" depth="12" height="4" width="12" material="side: back" color="#888"></a-box>

  <!-- ΠΟΡΤΑ -->
  <a-box id="door"
         position="0 1 -5.9"
         height="2"
         width="1"
         depth="0.1"
         color="red"
         door></a-box>

  <!-- ΚΛΕΙΔΙ -->
  <a-cylinder id="key"
              position="3 0.3 -2"
              radius="0.05"
              height="0.3"
              color="gold"
              key></a-cylinder>

  <!-- ΜΗΝΥΜΑ -->
  <a-text id="msg"
          value="Find the key"
          position="0 2 -2"
          align="center"
          width="4"
          color="white"></a-text>

  <!-- CAMERA + MOVEMENT -->
  <a-entity position="0 1.6 4"
            mo
