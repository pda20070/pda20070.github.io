<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Escape Room A-Frame</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- ⏱️ TIMER -->
  <a-text id="timer" value="Χρόνος: 60"
          position="-1 2 -3"
          color="red"></a-text>

  <!-- 👤 PLAYER -->
  <a-entity id="player"
            position="0 1.6 4"
            camera
            look-controls
            wasd-controls></a-entity>

  <!-- 🟫 FLOOR -->
  <a-plane rotation="-90 0 0"
           width="10"
           height="10"
           color="#555"></a-plane>

  <!-- 🧱 WALLS -->
  <a-box position="0 1 -5" width="10" height="3" depth="0.2" color="#888"></a-box>
  <a-box position="0 1 5"  width="10" height="3" depth="0.2" color="#888"></a-box>
  <a-box position="-5 1 0" width="0.2" height="3" depth="10" color="#888"></a-box>
  <a-box position="5 1 0"  width="0.2" height="3" depth="10" color="#888"></a-box>

  <!-- 🪑 OBSTACLES -->
  <a-box position="-2 0.5 0" width="1" height="1" depth="1" color="#8b5a2b"></a-box>
  <a-box position="2 0.5 -1" width="1.5" height="0.7" depth="1" color="#654321"></a-box>

  <!-- 🔑 KEY -->
  <a-sphere id="key"
            position="0 0.5 -3"
            radius="0.2"
            color="gold"></a-sphere>

  <!-- 🚪 DOOR -->
  <a-box id="door"
         position="0 1 -4.9"
         width="1"
         height="2"
         depth="0.1"
         color="brown"></a-box>

</a-scene>

<script>
let time = 60;
let hasKey = false;

const timerText = document.getElementById("timer");
const key = document.getElementById("key");
const door = document.getElementById("door");
const player = document.getElementById("player");

setInterval(() => {
  time--;
  timerText.setAttribute("value", "Χρόνος: " + time);
  if (time <= 0) {
    alert("⏱️ Τέλος χρόνου!");
    location.reload();
  }
}, 1000);

// Pick up key
key.addEventListener("mouseenter", () => {
  hasKey = true;
  key.setAttribute("visible", "false");
  alert("🔑 Πήρες το κλειδί!");
});

// Door logic
door.addEventListener("mouseenter", () => {
  if (hasKey) {
    alert("🎉 ESCAPED!");
    location.reload();
  } else {
    alert("❌ Χρειάζεσαι το κλειδί!");
  }
});
</script>

</body>
</html>
