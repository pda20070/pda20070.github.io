<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      // Ενότητα 4: Δημιουργία Component για αλληλεπίδραση [cite: 49, 50]
      AFRAME.registerComponent('door-unlock', {
        init: function () {
          var el = this.el;
          el.addEventListener('click', function () {
            // Όταν κάνουμε κλικ στο κλειδί, η πόρτα ανοίγει (εξαφανίζεται)
            document.querySelector('#exit-door').setAttribute('visible', 'false');
            document.querySelector('#exit-door').removeAttribute('static-body');
            alert("Η πόρτα ξεκλείδωσε!");
          });
          
          // Feedback όταν περνάει το ποντίκι (mouseenter/mouseleave) [cite: 51]
          el.addEventListener('mouseenter', function () {
            el.setAttribute('color', '#FFD700'); // Χρυσό χρώμα
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('color', 'orange');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false" cursor="rayOrigin: mouse">
      
      <a-sky color="#222"></a-sky>
      <a-plane static-body position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#333"></a-plane>

      <a-box static-body position="0 2.5 -5" width="10" height="5" depth="0.5" color="#555"></a-box> <a-box static-body position="0 2.5 5" width="10" height="5" depth="0.5" color="#555"></a-box>  <a-box static-body position="-5 2.5 0" width="0.5" height="5" depth="10" color="#555"></a-box> <a-box static-body position="5 2.5 0" width="0.5" height="5" depth="10" color="#555"></a-box>  <a-box id="exit-door" static-body position="0 1.5 -4.7" width="2" height="3" depth="0.2" color="#442200"></a-box>

      <a-box door-unlock position="-4 0.5 4" width="0.3" height="0.3" depth="0.3" color="orange" dynamic-body></a-box>

      <a-entity id="obstacles"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-sphere static-body position="0 -1 -1" radius="0.2" color="gray" opacity="0.5"></a-sphere>
      </a-entity>

    </a-scene>

    <script>
      // Ενότητα 3: Δημιουργία τυχαίων κύβων στο δωμάτιο [cite: 32, 36]
      var obsContainer = document.getElementById('obstacles');
      for (var i = 0; i < 10; i++) {
        var box = document.createElement('a-box');
        var x = Math.random() * 8 - 4;
        var z = Math.random() * 8 - 4;
        box.setAttribute('position', x + ' 0.5 ' + z);
        box.setAttribute('dynamic-body', 'mass: 1');
        box.setAttribute('color', 'silver');
        box.setAttribute('scale', '0.5 0.5 0.5');
        obsContainer.appendChild(box);
      }
    </script>
  </body>
</html>
