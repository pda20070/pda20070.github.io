<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mini Escape Room VR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    let hasKey = false;
    let timeLeft = 30;

    AFRAME.registerComponent('pick-key', {
      init: function () {
        this.el.addEventListener('click', () => {
          hasKey = true;
          this.el.setAttribute('visible', false);

          document.querySelector('#door')
            .setAttribute('color', 'green');

          document.querySelector('#message')
            .setAttribute('value', 'Πήρες το κλειδί! Η πόρτα ξεκλειδώθηκε.');

          document.querySelector('#keySound').components.sound.playSound();
        });
      }
    });

    AFRAME.registerComponent('open-door', {
      init: function () {
        this.el.addEventListener('click', () => {
          if (hasKey) {
            this.el.setAttribute('rotation', '0 90 0');
            document.querySelector('#message')
              .setAttribute('value', 'Συγχαρητήρια! Διέφυγες!');

            document.querySelector('#doorSound').components.sound.playSound();
          } else {
            document.querySelector('#message')
              .setAttribute('value', 'Χρειάζεσαι κλειδί!');
          }
        });
      }
    });

    AFRAME.registerComponent('timer', {
      init: function () {
        const el = this.el;
        setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            el.setAttribute('value', 'Χρόνος: ' + timeLeft);
          } else {
            el.setAttribute('value', 'Τέλος χρόνου!');
            document.querySelector('#message')
              .setAttribute('value', 'Απέτυχες να δραπετεύσεις...');
          }
        }, 1000);
      }
    });
  </script>
</head>

<body>
  <a-scene>

    <!-- Assets (ΠΟΛΥ ΣΗΜΑΝΤΙΚΟ) -->
    <a-assets>
      <audio id="key-audio" src="https://cdn.aframe.io/basic-guide/audio/click.ogg"></audio>
      <audio id="door-audio" src="https://cdn.aframe.io/basic-guide/audio/door.ogg"></audio>
    </a-assets>

    <!-- Φωτισμός -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="point" position="0 4 2" intensity="1"></a-light>

    <!-- Ήχοι -->
    <a-entity id="keySound" sound="src: #key-audio"></a-entity>
    <a-entity id="doorSound" sound="src: #door-audio"></a-entity>

    <!-- Πάτωμα -->
    <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <!-- Τοίχος -->
    <a-box position="0 1 -4" width="10" height="2" depth="0.2" color="#AAA"></a-box>

    <!-- Πόρτα -->
    <a-box id="door"
           position="0 1 -3.9"
           width="1"
           height="2"
           depth="0.1"
           color="brown"
           open-door>
    </a-box>

    <!-- Κλειδί -->
    <a-box position="2 0.5 -2"
           width="0.3"
           height="0.3"
           depth="0.1"
           color="gold"
           pick-key>
    </a-box>

    <!-- Μήνυμα -->
    <a-text id="message"
            value="Βρες το κλειδί για να φύγεις!"
            position="-1.5 2 -2"
            color="black"
            width="4">
    </a-text>

    <!-- Χρονόμετρο -->
    <a-text position="1.2 2 -2"
            color="red"
            width="4"
            timer>
    </a-text>

    <!-- -------------------------- ΝΕΑ ΑΝΤΙΚΕΙΜΕΝΑ -------------------------- -->

    <!-- 🟫 Κουτί -->
    <a-box position="-3 0.5 -2"
           width="1"
           height="1"
           depth="1"
           color="#8B4513"></a-box>

    <!-- 🍽️ Τραπέζι -->
    <a-box position="2 0.4 -3"
           width="2"
           height="0.2"
           depth="1"
           color="#654321"></a-box>
    <!-- Πόδια τραπεζιού -->
    <a-box position="1.2 0.2 -3"
           width="0.1"
           height="0.4"
           depth="0.1"
           color="#333"></a-box>
    <a-box position="2.8 0.2 -3"
           width="0.1"
           height="0.4"
           depth="0.1"
           color="#333"></a-box>

    <!-- 🪑 Καρέκλα -->
    <a-box position="2 0.25 -1.5"
           width="0.6"
           height="0.1"
           depth="0.6"
           color="#444"></a-box>
    <a-box position="2 0.6 -1.9"
           width="0.6"
           height="0.6"
           depth="0.1"
           color="#555"></a-box>

    <!-- 🪜 Σκάλα -->
    <a-box position="-4 0.25 -4"
           width="1"
           height="0.1"
           depth="0.4"
           color="#aaa"></a-box>
    <a-box position="-4 0.45 -4"
           width="1"
           height="0.1"
           depth="0.4"
           color="#aaa"></a-box>
    <a-box position="-4 0.65 -4"
           width="1"
           height="0.1"
           depth="0.4"
           color="#aaa"></a-box>

    <!-- ---------------------------------------------------------------------- -->

    <!-- Κάμερα + Cursor -->
    <a-entity position="0 1.6 3">
      <a-camera wasd-controls look-controls>
        <a-cursor></a-cursor>
      </a-camera>
    </a-entity>

  </a-scene>
</body>
</html>
