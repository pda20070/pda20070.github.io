<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Escape Room</title>
<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-family: Arial;
    }
    canvas {
        background: #2c2c2c;
        border: 3px solid #fff;
    }
</style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ⏱️ TIMER
let timeLeft = 60;
setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
        alert("⏱️ Τέλος χρόνου! Έχασες!");
        location.reload();
    }
}, 1000);

// Player
const player = {
    x: 50,
    y: 400,
    size: 20,
    speed: 3,
    hasKey: false
};

// Obstacles
const obstacles = [
    {x:150,y:350,w:80,h:40},
    {x:300,y:300,w:40,h:40},
    {x:500,y:350,w:60,h:30},
    {x:200,y:200,w:100,h:40},
    {x:400,y:150,w:40,h:40}
];

// Ladder
const ladder = {x:700,y:300,w:30,h:120};

// Door & key
const door = {x:700,y:50,w:60,h:80};
const key = {x:715,y:140,size:15, taken:false};

// Controls
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function collision(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.size > b.x &&
           a.y < b.y + b.h &&
           a.y + a.size > b.y;
}

function update() {
    let nx = player.x;
    let ny = player.y;

    if (keys["w"] || keys["ArrowUp"]) ny -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) ny += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) nx -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) nx += player.speed;

    const future = {x:nx,y:ny,size:player.size};

    let blocked = false;
    obstacles.forEach(o => {
        if (collision(future,{x:o.x,y:o.y,w:o.w,h:o.h})) blocked = true;
    });

    if (!blocked) {
        player.x = nx;
        player.y = ny;
    }

    // Ladder
    if (collision(player,{x:ladder.x,y:ladder.y,w:ladder.w,h:ladder.h})) {
        player.y -= 1;
    }

    // Key
    if (!key.taken &&
        Math.hypot(player.x-key.x, player.y-key.y) < 20) {
        key.taken = true;
        player.hasKey = true;
        alert("🔑 Πήρες το κλειδί!");
    }

    // Door
    if (collision(player,door)) {
        if (player.hasKey) {
            alert("🎉 ESCAPED με χρόνο " + timeLeft + "s!");
            location.reload();
        } else {
            alert("❌ Χρειάζεσαι το κλειδί!");
            player.y += 20;
        }
    }
}

function drawFog() {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(player.x+10, player.y+10, 120, 0, Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation = "source-over";
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Obstacles
    ctx.fillStyle = "#8b5a2b";
    obstacles.forEach(o => ctx.fillRect(o.x,o.y,o.w,o.h));

    // Ladder
    ctx.fillStyle = "#aaa";
    ctx.fillRect(ladder.x,ladder.y,ladder.w,ladder.h);

    // Door
    ctx.fillStyle = "#552200";
    ctx.fillRect(door.x,door.y,door.w,door.h);

    // Key
    if (!key.taken) {
        ctx.fillStyle = "gold";
        ctx.beginPath();
        ctx.arc(key.x,key.y,key.size,0,Math.PI*2);
        ctx.fill();
    }

    // Player
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    // ⏱️ TIMER DISPLAY
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Χρόνος: " + timeLeft + "s", 10, 25);

    drawFog();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
