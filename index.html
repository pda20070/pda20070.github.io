<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Escape Room VR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://c-frame.github.io/aframe-physics-system/dist/aframe-physics-system.min.js"></script>

  <script>
    let hasKey = false;
    let hasTorch = false;
    let boxUnlocked = false;
    let timeLeft = 60;

    /* TIMER */
    AFRAME.registerComponent('timer', {
      init: function () {
        const el = this.el;
        setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            el.setAttribute('value', 'Χρόνος: ' + timeLeft);
          } else {
            el.setAttribute('value', 'Τέλος χρόνου!');
            document.querySelector('#msg')
              .setAttribute('value', 'Game Over...');
          }
        }, 1000);
      }
    });

    /* ΠΑΙΡΝΩ ΑΝΤΙΚΕΙΜΕΝΑ */
    AFRAME.registerComponent('pickable', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {

          if (this.el.id === 'torch') {
            hasTorch = true;
            document.querySelector('#scene')
              .setAttribute('fog', 'color: #222; far: 1000');
            document.querySelector('#msg')
              .setAttribute('value', 'Πήρες τον φακό!');
          }

          if (this.el.id === 'key') {
            hasKey = true;
            document.querySelector('#msg')
              .setAttribute('value', 'Βρήκες το κλειδί!');
          }

          this.el.remove();
        });
      }
    });

    /* ΚΟΥΜΠΙ */
    AFRAME.registerComponent('button', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          if (!boxUnlocked && hasTorch) {
            boxUnlocked = true;

            document.querySelector('#box')
              .setAttribute('animation',
                'property: scale; to: 1 0.2 1; dur: 800');

            document.querySelector('#key')
              .setAttribute('visible', true);

            document.querySelector('#msg')
              .setAttribute('value', 'Το κουτί άνοιξε!');
          }
          else if (!hasTorch) {
            document.querySelector('#msg')
              .setAttribute('value', 'Δεν βλέπεις καλά...');
          }
        });
      }
    });

    /* ΠΟΡΤΑ */
    AFRAME.registerComponent('door', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          if (hasKey) {
            this.el.setAttribute('rotation', '0 90 0');
            document.querySelector('#msg')
              .setAttribute('value', 'Συγχαρητήρια! Διέφυγες!');
          } else {
            document.querySelector('#msg')
              .setAttribute('value', 'Η πόρτα είναι κλειδωμένη...');
          }
        });
      }
    });
  </script>
</head>

<body>
<a-scene id="scene"
         fog="color: #222; near: 1; far: 6"
         physics>

  <!-- ΦΩΤΑ -->
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="point" position="0 6 0" intensity="1"></a-light>

  <!-- ΔΩΜΑΤΙΟ -->
  <a-plane static-body rotation="-90 0 0" width="40" height="40" color="#444"></a-plane>
  <a-plane static-body position="0 4 -20" width="40" height="8" color="#666"></a-plane>
  <a-plane static-body position="0 4 20" rotation="0 180 0" width="40" height="8" color="#666"></a-plane>
  <a-plane static-body position="-20 4 0" rotation="0 90 0" width="40" height="8" color="#555"></a-plane>
  <a-plane static-body position="20 4 0" rotation="0 -90 0" width="40" height="8" color="#555"></a-plane>

  <!-- ΣΚΑΛΑ -->
  <a-box static-body color="#8b5a2b" scale="1 1 3" position="0 0.5 -14"></a-box>
  <a-box static-body color="#8b5a2b" scale="1 1 3" position="0 1.5 -16"></a-box>
  <a-box static-body color="#8b5a2b" scale="1 1 3" position="0 2.5 -18"></a-box>

  <!-- ΠΟΡΤΑ -->
  <a-box id="door"
         position="0 4.5 -19.8"
         width="2"
         height="3"
         depth="0.2"
         color="darkgreen"
         door></a-box>

  <!-- ΚΟΥΜΠΙ -->
  <a-box id="button"
         position="-6 1.5 -10"
         width="0.4"
         height="0.4"
         depth="0.2"
         color="red"
         button></a-box>

  <!-- ΚΟΥΤΙ -->
  <a-box id="box"
         position="-6 0.5 -8"
         width="1"
         height="1"
         depth="1"
         color="#5a3a1a"></a-box>

  <!-- ΚΛΕΙΔΙ (ΚΡΥΦΟ) -->
  <a-cylinder id="key"
              position="-6 1 -8"
              radius="0.05"
              height="0.3"
              color="gold"
              visible="false"
              pickable></a-cylinder>

  <!-- ΦΑΚΟΣ -->
  <a-cylinder id="torch"
              position="5 1 -5"
              radius="0.15"
              height="0.5"
              color="black"
              pickable>
    <a-light type="spot" intensity="0.8" angle="25" position="0 0.3 0"></a-light>
  </a-cylinder>

  <!-- ΜΗΝΥΜΑ -->
  <a-text id="msg"
          value="Βρες τον φακό"
          position="-2 2 -3"
          width="4"
          color="white"></a-text>

  <!-- TIMER -->
  <a-text position="2 2 -3"
          width="4"
          color="red"
          timer></a-text>

  <!-- PLAYER -->
  <a-entity id="player" position="0 0 10">
    <a-cylinder static-body radius="0.3" height="1.6" position="0 0.8 0" visible="false"></a-cylinder>
    <a-entity camera look-controls wasd-controls position="0 1.6 0">
      <a-cursor fuse="true" color="yellow"></a-cursor>
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
